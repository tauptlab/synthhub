name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: python -m pip install -e ".[test,datasynthesizer]"
      - name: Test
        run: python -m pytest -q
      - name: Build wheel
        run: python -m pip wheel . --no-deps -w dist
      - name: Benchmark smoke
        run: python benchmarks/run_benchmark.py --methods independent privbayes datasynthesizer-independent --sample-rows 80

