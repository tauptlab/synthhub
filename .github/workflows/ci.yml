name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  core:
    name: Core Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: python -m pip install -e ".[test]"
      - name: Test
        run: python -m pytest -q

  datasynthesizer:
    name: DataSynthesizer Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: python -m pip install -e ".[test,datasynthesizer]"
      - name: Test
        run: python -m pytest -q
      - name: Benchmark smoke
        run: python benchmarks/run_benchmark.py --datasets breast_cancer --methods independent privbayes datasynthesizer-independent --sample-rows 80

  smartnoise:
    name: SmartNoise live smoke
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: python -m pip install -e ".[test,smartnoise]"
      - name: MWEM live smoke
        run: python -m pytest tests/test_optional_backends.py::test_smartnoise_mwem_live_smoke_if_installed -q

  package:
    name: Package build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install build tools
        run: python -m pip install build twine
      - name: Build sdist and wheel
        run: python -m build
      - name: Check package metadata
        run: python -m twine check dist/*
