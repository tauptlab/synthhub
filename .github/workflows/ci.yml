name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  core:
    name: Core Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: python -m pip install -e ".[test]"
      - name: Test
        run: python -m pytest -q

  datasynthesizer:
    name: DataSynthesizer Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: python -m pip install -e ".[test,datasynthesizer]"
      - name: Test
        run: python -m pytest -q
      - name: Benchmark smoke
        run: python benchmarks/run_benchmark.py --datasets breast_cancer --methods independent privbayes datasynthesizer-independent --sample-rows 80

  smartnoise:
    name: SmartNoise live smoke
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: python -m pip install -e ".[test,smartnoise]"
      - name: MWEM/AIM/MST live smoke
        run: |
          python -m pytest \
            tests/test_optional_backends.py::test_smartnoise_mwem_live_smoke_if_installed \
            tests/test_optional_backends.py::test_smartnoise_aim_live_smoke_if_installed \
            tests/test_optional_backends.py::test_smartnoise_mst_live_smoke_if_installed \
            -q

  private-pgm:
    name: Private-PGM live smoke
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: python -m pip install -e ".[test,private-pgm]"
      - name: Clone Private-PGM mechanisms
        run: git clone --depth 1 https://github.com/ryan112358/private-pgm.git .tmp-private-pgm-src
      - name: Configure mechanism path
        run: |
          echo "PYTHONPATH=${GITHUB_WORKSPACE}/.tmp-private-pgm-src:${GITHUB_WORKSPACE}/.tmp-private-pgm-src/mechanisms" >> "$GITHUB_ENV"
      - name: AIM/MST live smoke
        run: |
          python -m pytest \
            tests/test_optional_backends.py::test_private_pgm_mst_live_smoke_if_mechanisms_available \
            tests/test_optional_backends.py::test_private_pgm_aim_live_smoke_if_mechanisms_available \
            -q

  package:
    name: Package build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install build tools
        run: python -m pip install build twine
      - name: Build sdist and wheel
        run: python -m build
      - name: Check package metadata
        run: python -m twine check dist/*
