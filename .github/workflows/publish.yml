name: Publish

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    if: github.repository == 'tauptlab/synthhub'
    environment: pypi
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install build tools
        run: python -m pip install build twine
      - name: Build package
        run: python -m build
      - name: Check package metadata
        run: python -m twine check dist/*
      - name: Check existing PyPI release
        id: pypi
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import tomllib
          import urllib.error
          import urllib.request

          with open("pyproject.toml", "rb") as file:
              version = tomllib.load(file)["project"]["version"]

          url = f"https://pypi.org/pypi/synthhub/{version}/json"
          try:
              urllib.request.urlopen(url, timeout=15).close()
              exists = "true"
          except urllib.error.HTTPError as exc:
              if exc.code != 404:
                  raise
              exists = "false"

          print(f"version={version}")
          print(f"exists={exists}")
          PY
      - name: Skip existing PyPI release
        if: steps.pypi.outputs.exists == 'true'
        run: echo "synthhub ${{ steps.pypi.outputs.version }} already exists on PyPI; skipping upload."
      - name: Publish package
        if: steps.pypi.outputs.exists != 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
